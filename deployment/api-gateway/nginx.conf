# API Gateway Configuration for CMA Core/Edge Architecture
# ==========================================================
# This Nginx configuration acts as an API Gateway between
# Core services (CENSUS, AXLerate, Superset) and Edge applications
# ==========================================================

events {
    worker_connections 1024;
}

http {
    # Upstream Core Services
    upstream census_backend {
        server census_db:5432;
    }
    
    upstream axlerate_backend {
        server axlerate:8000;
    }
    
    upstream superset_backend {
        server superset:8088;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # API Gateway Server
    server {
        listen 80;
        server_name api-gateway;
        
        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        
        # CORS configuration
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key" always;
        add_header Access-Control-Max-Age 86400 always;
        
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # API Key Authentication Zone
        location /api/ {
            # Apply rate limiting
            limit_req zone=auth burst=20 nodelay;
            
            # API Key validation
            auth_request_set $api_key $http_x_api_key;
            
            # Check if API key is provided
            if ($api_key = "") {
                return 401 "API Key Required";
            }
            
            # Validate API key (in production, use Redis or database)
            set $auth_valid "0";
            
            # Sample API keys (in production, use database)
            if ($api_key = "telephony-app-key-123") {
                set $auth_valid "1";
            }
            
            if ($api_key = "meetings-app-key-456") {
                set $auth_valid "1";
            }
            
            if ($auth_valid = "0") {
                return 403 "Invalid API Key";
            }
            
            # Proxy to AXLerate for telephony operations
            location /api/telephony/ {
                proxy_pass http://axlerate_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                
                # Request/Response logging
                access_log /var/log/nginx/telephony_access.log;
                error_log /var/log/nginx/telephony_error.log;
            }
            
            # Proxy to CENSUS for data operations
            location /api/census/ {
                proxy_pass http://census_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                
                # Request/Response logging
                access_log /var/log/nginx/census_access.log;
                error_log /var/log/nginx/census_error.log;
            }
        }

        # Superset proxy (with authentication)
        location /superset/ {
            # Apply rate limiting
            limit_req zone=api burst=20 nodelay;
            
            # API Key validation
            auth_request_set $api_key $http_x_api_key;
            
            if ($api_key = "") {
                return 401 "API Key Required";
            }
            
            # Validate API key for Superset access
            set $auth_valid "0";
            if ($api_key = "superset-app-key-789") {
                set $auth_valid "1";
            }
            
            if ($auth_valid = "0") {
                return 403 "Invalid API Key";
            }
            
            # Proxy to Superset
            proxy_pass http://superset_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Request/Response logging
            access_log /var/log/nginx/superset_access.log;
            error_log /var/log/nginx/superset_error.log;
        }

        # Static files and assets
        location /static/ {
            alias /var/www/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Default location
        location / {
            return 200 "CMA API Gateway - Use /api/ for API endpoints";
            add_header Content-Type text/plain;
        }
    }

    # Logging configuration
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
}

