version: '3.8'

services:
  # ===========================================================================
  # Meetings Management Application
  # ===========================================================================
  meetings-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meetings-management-app
    restart: unless-stopped
    ports:
      - "8090:8080"  # Application port
    environment:
      # API Gateway Configuration
      API_GATEWAY_URL: http://api-gateway:8001
      API_KEY: meetings-app-key-456
      
      # AXLerate Configuration (Core service)
      AXLERATE_BASE_URL: http://10.X.X.X:8002  # Core server IP
      AXLERATE_API_KEY: ${AXLERATE_API_KEY:-default-api-key}
      
      # Application Configuration
      APP_NAME: Meetings Management
      APP_VERSION: 1.0.0
      ENVIRONMENT: production
      TZ: Asia/Jerusalem
      
      # Database Configuration (if needed)
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: meetings_app
      DB_USER: meetings_user
      DB_PASSWORD: ${DB_PASSWORD:-secure_password}
      
      # Logging Configuration
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      
      # Calendar Integration
      CALENDAR_API_URL: ${CALENDAR_API_URL:-https://calendar.company.com/api}
      CALENDAR_API_KEY: ${CALENDAR_API_KEY:-default-calendar-key}
      
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
      - ./config:/app/config:ro
    networks:
      - telephony-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - meetings-db

  # ===========================================================================
  # Local Database for Meetings App (if needed)
  # ===========================================================================
  meetings-db:
    image: postgres:15-alpine
    container_name: meetings-app-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: meetings_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
      POSTGRES_DB: meetings_app
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - meetings_db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - telephony-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetings_user"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# =============================================================================
# Named Volumes for Data Persistence
# =============================================================================
volumes:
  app_data:
    driver: local
  app_logs:
    driver: local
  meetings_db_data:
    driver: local

# =============================================================================
# Docker Networks
# =============================================================================
networks:
  # Edge network - connects to API Gateway
  telephony-network:
    external: true
