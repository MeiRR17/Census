version: '3.8'

services:
  # ===========================================================================
  # CENSUS Database - Central Data Store
  # ===========================================================================
  census-db:
    image: postgres:15-alpine
    container_name: census-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: census_user
      POSTGRES_PASSWORD: ${CENSUS_PASSWORD:-census_password}
      POSTGRES_DB: census_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - census_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U census_user"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cma-global-network

  # ===========================================================================
  # CENSUS API - Central API Service
  # ===========================================================================
  census-api:
    build:
      context: ../Census
      dockerfile: Dockerfile
    container_name: census-api
    restart: unless-stopped
    environment:
      # Database Configuration
      CENSUS_DB_URL: postgresql://census_user:${CENSUS_PASSWORD:-census_password}@census-db:5432/census_db
      
      # API Configuration
      API_HOST: 0.0.0.0
      API_PORT: 8001
      API_WORKERS: 4
      ENVIRONMENT: production
      TZ: Asia/Jerusalem
      
      # Authentication
      AUTH_SERVICE_URL: http://auth-service:8002
      AUTH_API_KEY: ${AUTH_API_KEY:-default-auth-key}
    ports:
      - "8001:8001"
    depends_on:
      census-db:
        condition: service_healthy
    networks:
      - cma-global-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================================================
  # AXLerate Gateway - Cisco UC Integration
  # ===========================================================================
  axlerate:
    build:
      context: ../AXLerate
      dockerfile: Dockerfile
    container_name: axlerate-gateway
    restart: unless-stopped
    environment:
      # Cisco UC Configuration
      CUCM_HOST: ${CUCM_HOST:-cucm.company.com}
      CUCM_USERNAME: ${CUCM_USERNAME:-admin}
      CUCM_PASSWORD: ${CUCM_PASSWORD:-password}
      UCCX_HOST: ${UCCX_HOST:-uccx.company.com}
      UCCX_USERNAME: ${UCCX_USERNAME:-admin}
      UCCX_PASSWORD: ${UCCX_PASSWORD:-password}
      
      # API Configuration
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_WORKERS: 4
      ENVIRONMENT: production
      TZ: Asia/Jerusalem
      
      # Authentication
      AUTH_SERVICE_URL: http://auth-service:8002
      AUTH_API_KEY: ${AUTH_API_KEY:-default-auth-key}
      
      # CENSUS Integration
      CENSUS_API_URL: http://census-api:8001
      CENSUS_API_KEY: ${CENSUS_API_KEY:-default-census-key}
    ports:
      - "8000:8000"
    depends_on:
      census-api:
        condition: service_healthy
    networks:
      - cma-global-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================================================
  # Superset - BI Platform
  # ===========================================================================
  superset:
    build:
      context: ../Superset/superset
      dockerfile: Dockerfile
    container_name: superset
    restart: unless-stopped
    environment:
      # Database Configuration
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      CENSUS_DATABASE_URI: postgresql://census_user:${CENSUS_PASSWORD:-census_password}@census-db:5432/census_db
      
      # Cache Configuration
      REDIS_URL: redis://redis:6379/0
      
      # Security
      SECRET_KEY: ${SUPERSET_SECRET_KEY:-your-super-secret-key-change-in-production}
      
      # Application Configuration
      SUPERSET_ENV: production
      TZ: Asia/Jerusalem
    ports:
      - "8088:8088"
    depends_on:
      census-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cma-global-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================================================
  # Redis Cache - Shared Cache Service
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis-password}
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - cma-global-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis-password}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================================================
  # Authentication Service - Centralized Auth
  # ===========================================================================
  auth-service:
    build:
      context: ../deployment/api-gateway
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    environment:
      # Database Configuration
      AUTH_DB_URL: postgresql://auth_user:${AUTH_PASSWORD:-auth-password}@auth-db:5432/auth_db
      
      # Service Configuration
      API_HOST: 0.0.0.0
      API_PORT: 8002
      API_WORKERS: 2
      ENVIRONMENT: production
      TZ: Asia/Jerusalem
      
      # Redis Configuration
      REDIS_URL: redis://redis:6379/1
    ports:
      - "8002:8002"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cma-global-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================================================
  # Auth Database - Authentication Data Store
  # ===========================================================================
  auth-db:
    image: postgres:15-alpine
    container_name: auth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: ${AUTH_PASSWORD:-auth-password}
      POSTGRES_DB: auth_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - auth_data:/var/lib/postgresql/data
      - ./auth/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - cma-global-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# =============================================================================
# Named Volumes for Data Persistence
# =============================================================================
volumes:
  census_data:
    driver: local
  redis_data:
    driver: local
  auth_data:
    driver: local

# =============================================================================
# Docker Networks
# =============================================================================
networks:
  # Core network - connects all core services
  cma-global-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
