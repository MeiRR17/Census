version: '3.8'

services:
  # PostgreSQL Database (CENSUS)
  postgres:
    image: pgvector/pgvector:pg15
    container_name: axlerate-postgres
    environment:
      POSTGRES_DB: census
      POSTGRES_USER: census_user
      POSTGRES_PASSWORD: census_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U census_user -d census"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - axlerate-network

  # Redis (Caching and Message Queue)
  redis:
    image: redis:7-alpine
    container_name: axlerate-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - axlerate-network

  # AXLerate API Gateway
  axlerate-gateway:
    build: .
    container_name: axlerate-gateway
    environment:
      # CUCM Connection
      CUCM_SERVER: ${CUCM_SERVER:-192.168.1.100}
      CUCM_USERNAME: ${CUCM_USERNAME:-admin}
      CUCM_PASSWORD: ${CUCM_PASSWORD:-admin}
      CUCM_PORT: ${CUCM_PORT:-8443}
      CUCM_VERIFY_SSL: ${CUCM_VERIFY_SSL:-false}
      
      # CENSUS DB Connection
      CENSUS_DB_URL: postgresql://census_user:census_password@postgres:5432/census
      
      # Gateway Configuration
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - axlerate-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: axlerate-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - axlerate-gateway
    networks:
      - axlerate-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  axlerate-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
