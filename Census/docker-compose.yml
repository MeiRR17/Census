version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg15
    container_name: census_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: census_user
      POSTGRES_PASSWORD: census_password
      POSTGRES_DB: census_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U census_user -d census_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cma-global-network

volumes:
  postgres_data:

networks:
  cma-global-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
