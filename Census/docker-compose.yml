version: '3.8'

services:
  census:
    build: .
    container_name: census_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - CMS_URL=http://localhost:8000
      - CMS_USERNAME=admin
      - CMS_PASSWORD=password
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cma-global-network

  db:
    image: pgvector/pgvector:pg15
    container_name: census_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: census_user
      POSTGRES_PASSWORD: census_password
      POSTGRES_DB: census_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U census_user -d census_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cma-global-network

volumes:
  postgres_data:

networks:
  cma-global-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
