version: '3.8'

services:
  census:
    build: 
      context: .
      dockerfile: Dockerfile-clean
    container_name: census_clean_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://census_user:census_password@db:5432/census_db
      # CUCM Configuration
      - CUCM_HOST=${CUCM_HOST:-}
      - CUCM_USERNAME=${CUCM_USERNAME:-}
      - CUCM_PASSWORD=${CUCM_PASSWORD:-}
      # CMS Configuration  
      - CMS_HOST=${CMS_HOST:-}
      - CMS_USERNAME=${CMS_USERNAME:-}
      - CMS_PASSWORD=${CMS_PASSWORD:-}
      # MeetingPlace Configuration
      - MEETINGPLACE_HOST=${MEETINGPLACE_HOST:-}
      - MEETINGPLACE_USERNAME=${MEETINGPLACE_USERNAME:-}
      - MEETINGPLACE_PASSWORD=${MEETINGPLACE_PASSWORD:-}
      # UCCX Configuration
      - UCCX_HOST=${UCCX_HOST:-}
      - UCCX_USERNAME=${UCCX_USERNAME:-}
      - UCCX_PASSWORD=${UCCX_PASSWORD:-}
      # Expressway Configuration
      - EXPRESSWAY_HOST=${EXPRESSWAY_HOST:-}
      - EXPRESSWAY_USERNAME=${EXPRESSWAY_USERNAME:-}
      - EXPRESSWAY_PASSWORD=${EXPRESSWAY_PASSWORD:-}
      # SBC Configuration
      - SBC_HOST=${SBC_HOST:-}
      - SBC_USERNAME=${SBC_USERNAME:-}
      - SBC_PASSWORD=${SBC_PASSWORD:-}
      # TGW Configuration
      - TGW_HOST=${TGW_HOST:-}
      - TGW_USERNAME=${TGW_USERNAME:-}
      - TGW_PASSWORD=${TGW_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - census-network
    volumes:
      - ./logs:/app/logs

  db:
    image: postgres:15
    container_name: census_clean_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: census_user
      POSTGRES_PASSWORD: census_password
      POSTGRES_DB: census_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U census_user -d census_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - census-network

  nginx:
    image: nginx:alpine
    container_name: census_clean_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-clean.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - census
    networks:
      - census-network

volumes:
  postgres_data:

networks:
  census-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
